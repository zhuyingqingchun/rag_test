# REFRAG预训练模型配置

# 模型配置
model:
  encoder_name: "roberta-base"  # 可以是路径或模型名称
  decoder_name: "meta-llama/Llama-2-7b-hf"  # 可以是路径或模型名称
  block_size: 32
  use_rl_policy: true
  
  # 预训练模型路径（如果使用本地模型）
  pretrained_encoder_path: ""  # 留空使用Hugging Face模型
  pretrained_decoder_path: ""  # 留空使用Hugging Face模型
  
  encoder_config:
    pooling: "mean"
    
  projection_config:
    dropout: 0.1
    activation: "gelu"
    
  decoder_config:
    use_flash_attention: true
    max_length: 4096
    trust_remote_code: false
    
  rl_config:
    hidden_dim: 512
    num_layers: 2
    num_heads: 8
    expansion_ratio: 0.1
    dropout: 0.1

# 训练配置
training:
  # 通用配置
  batch_size: 32
  num_workers: 4
  mixed_precision: true
  max_grad_norm: 1.0
  
  # 各阶段配置（使用预训练模型时，主要训练RL和SFT）
  rl:
    learning_rate: 1e-5
    num_epochs: 1
    epsilon: 0.2
    value_coef: 0.5
    entropy_coef: 0.01
    num_samples_per_example: 4
    
  sft:
    learning_rate: 2e-5
    weight_decay: 0.01
    warmup_ratio: 0.04
    num_epochs: 3

# 数据配置
data:
  train_data_path: "data/train.jsonl"
  val_data_path: "data/val.jsonl"
  test_data_path: "data/test.jsonl"
  
  # RAG数据配置
  rag:
    max_context_length: 2048
    max_query_length: 256
    max_answer_length: 512

# 推理配置
inference:
  max_new_tokens: 256
  temperature: 0.7
  top_p: 0.9
  top_k: 50
  num_beams: 1
  do_sample: true
  use_cache: true
  block_embedding_cache: true
  selective_expansion: true
  expansion_ratio: 0.1
  batch_size: 1

# 输出配置
output:
  output_dir: "./outputs"
  log_interval: 100
  save_interval: 1000
  checkpoint_dir: "./checkpoints"

# 评估配置
evaluation:
  eval_interval: 500
  metrics: ["accuracy", "f1", "rouge", "perplexity"]
  save_predictions: true